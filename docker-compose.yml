services:
  db:
    image: postgres:16-alpine
    container_name: tea-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tea_shop
      POSTGRES_USER: tea_user
      POSTGRES_PASSWORD: tea_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tea_user -d tea_shop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tea-shop-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tea_user:tea_pass@db:5432/tea_shop}
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build:
      context: ./backend
    container_name: tea-shop-bot
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tea_user:tea_pass@db:5432/tea_shop}
    command: python -m app.bot.main
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: tea-shop-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
      VITE_DEMO_USER_ID: ${VITE_DEMO_USER_ID:-900000001}
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

